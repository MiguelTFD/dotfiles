[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>

format-disconnected-prefix = 󰞃
format-disconnected-prefix-padding = 6px
format-disconnected-prefix-background = ${colors.bg4}
format-disconnected-prefix-foreground = ${colors.fg1}

label-disconnected = off
label-disconnected-padding = 6px
label-disconnected-background = ${colors.bg4}
label-disconnected-foreground = ${colors.fg1}


[module/wlan]
inherit = network-base
interface-type = wireless

format-connected = <ramp-signal>

format-connected-prefix = 
format-connected-prefix-padding = 1

format-connected-prefix-background = ${colors.bg4}
format-connected-prefix-foreground = ${colors.fg1}

ramp-signal-background = ${colors.bg4}
ramp-signal-foreground = ${colors.fg1}
ramp-signal-padding = 1

ramp-signal-0 = _
ramp-signal-1 = ▂
ramp-signal-2 = ▃
ramp-signal-3 = ▄
ramp-signal-4 = ▅
ramp-signal-5 = ▆
ramp-signal-6 = ▇
ramp-signal-7 = █


[module/eth]
inherit = network-base
interface-type = wired

format-connected = <label-connected>

format-connected-prefix = 󰈀
format-connected-prefix-padding = 6px
format-connected-prefix-background = ${colors.bg4}
format-connected-prefix-foreground = ${colors.fg1}

label-connected = wired
label-connected-padding = 6px
label-connected-background = ${colors.bg4}
label-connected-foreground = ${colors.fg1}
