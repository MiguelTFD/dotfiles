[module/rootdisk]
type = internal/fs
mount-0 = /
interval = 60

format-mounted = <ramp-capacity>
format-mounted-prefix = 󰋊
format-mounted-prefix-padding = 6px
format-mounted-prefix-background = ${colors.bg1}
format-mounted-prefix-foreground = ${colors.fg3}

ramp-capacity-0 = "%{F#98971a}█%{F-}"
ramp-capacity-1 = "%{F#98971a}█%{F-}"
ramp-capacity-2 = "%{F#98971a}█%{F-}"
ramp-capacity-3 = ▇
ramp-capacity-4 = ▆
ramp-capacity-5 = ▅
ramp-capacity-6 = ▄
ramp-capacity-7 = ▃
ramp-capacity-8 = ▂
ramp-capacity-9 = "%{F#504945}▁%{F-}"
ramp-capacity-10 = "%{F#504945}▁%{F-}"
ramp-capacity-11 = " "

ramp-capacity-padding = 6px
ramp-capacity-background = ${colors.bg1}
ramp-capacity-foreground = ${colors.fg3}

warn-percentage = 100
