[module/rootdisk]
type = internal/fs
mount-0 = /
interval = 60

format-mounted = <ramp-capacity>
format-mounted-prefix = 󰋊
format-mounted-prefix-padding = 6px
format-mounted-prefix-background = ${colors.nord0}
format-mounted-prefix-foreground = ${colors.nord6}

ramp-capacity-0 = "%{F#81a1c1}█%{F-}"
ramp-capacity-1 = "%{F#81a1c1}█%{F-}"
ramp-capacity-2 = "%{F#81a1c1}█%{F-}"
ramp-capacity-3 = ▇
ramp-capacity-4 = ▆
ramp-capacity-5 = ▅
ramp-capacity-6 = ▄
ramp-capacity-7 = ▃
ramp-capacity-8 = ▂
ramp-capacity-9 = "%{F#d8dee9}▁%{F-}"
ramp-capacity-10 = "%{F#d8dee9}▁%{F-}"
ramp-capacity-11 = " "

ramp-capacity-padding = 6px
ramp-capacity-background = ${colors.nord0}
ramp-capacity-foreground = ${colors.nord6}

warn-percentage = 100
