[module/datetime]
type = internal/date
interval = 1
hidden = false
format = <label>
format-prefix = 󰃭

format-prefix-background = ${colors.nord3}
format-prefix-foreground = ${colors.nord6}

format-prefix-padding = 6px

time = %H:%M|%d-%m
label = %time%
label-padding = 6px
label-font = 3

label-background = ${colors.nord3}
label-foreground = ${colors.nord6}
