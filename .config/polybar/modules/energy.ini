[module/battery]
type = custom/script
exec = echo "10%"
interval = 99999

format = <label>

format-prefix = 󰂂
format-prefix-padding = 6px
format-prefix-background = ${colors.nord2}
format-prefix-foreground = ${colors.nord5}

label = %output%
label-padding = 6px
label-background = ${colors.nord2}
label-foreground = ${colors.nord5}


[module/powerplug]
type = custom/script
exec = echo "wired"
interval = 99999

format = <label>

format-prefix = 󰚥
format-prefix-padding = 6px
format-prefix-background = ${colors.nord2}
format-prefix-foreground = ${colors.nord5}

label = %output%
label-padding = 6px
label-background = ${colors.nord2}
label-foreground = ${colors.nord5}
