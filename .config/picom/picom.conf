backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

shadow = false;

fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

active-opacity = 1.0;
inactive-opacity = 0.90;
frame-opacity = 1.0;

use-damage = true;
detect-client-opacity = true;
detect-transient = true;
log-level = "warn";

opacity-rule = [
  "100:class_g = 'Rofi'"
];
