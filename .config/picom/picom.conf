# --- Backend Agnóstico y Ligero ---
# xrender es el motor de renderizado 2D por defecto. Es súper estable,
# no depende de aceleración 3D pesada y se lleva perfecto con Nouveau.
backend = "xrender";
vsync = true;

# --- Sombras ---
# Desactivadas para máximo rendimiento. En i3wm las sombras a veces 
# ensucian los bordes si no están perfectamente configuradas.
shadow = false;

# --- Transiciones (Fading) ---
# Efecto suave al abrir/cerrar ventanas o cambiar de workspace.
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

# --- Opacidad ---
# Un toque muy ligero de transparencia para las ventanas inactivas. 
# Hace que tu terminal y tu editor destaquen de maravilla, sobre todo 
# si usas paletas de colores con tonos cálidos o terrosos en tu entorno.
active-opacity = 1.0;
inactive-opacity = 0.95;
frame-opacity = 1.0;

# --- Optimizaciones de Rendimiento ---
# Solo redibuja las partes de la pantalla que realmente cambian.
use-damage = true;
detect-client-opacity = true;
detect-transient = true;
log-level = "warn";
