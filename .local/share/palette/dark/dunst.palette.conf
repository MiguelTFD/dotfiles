[global]
    font = "JetBrainsMono Nerd Font 12"
    markup = full
    format = "<u><i>%a</i></u>\n<b>%s</b>\n%b"
    sort = yes
    indicate_hidden = yes
    alignment = center
    stack_duplicates = true
    bounce_freq = 0
    show_age_threshold = 60
    word_wrap = yes
    ignore_newline = no
    width = 300
    height = 300
    origin = top-center
    offset = 0x48
    browser = /usr/bin/firefox -new-tab
    transparency = 0
    idle_threshold = 120
    monitor = 0
    follow = mouse
    sticky_history = yes
    line_height = 0
    padding = 8
    gap_size = 3
    horizontal_padding = 8
    startup_notification = false
    frame_width = 3
    history_length = 20
    timeout = 6

[urgency_low]
    background = "#3b4252"
    foreground = "#d8dee9"
    frame_color = "#d8dee9"
    highlight = "#d8dee9"
    timeout = 3

[urgency_normal]
    background = "#3b4252"
    foreground = "#81a1c1"
    frame_color = "#81a1c1"
    highlight = "#81a1c1"
    timeout = 6

[urgency_critical]
    background = "#3b4252"
    foreground = "#bf616a"
    frame_color = "#bf616a"
    highlight = "#bf616a"
    timeout = 9
